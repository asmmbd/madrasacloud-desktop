<!DOCTYPE html>
<html lang="bn">

<head>
  <meta charset="UTF-8" />
  <title>সংযোগ নেই — MadrasaCloud</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #0a2e1a, #050e08);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      user-select: none;
    }

    .card {
      text-align: center;
      padding: 48px 40px;
      background: rgba(255, 255, 255, .04);
      border: 1px solid rgba(255, 255, 255, .08);
      border-radius: 24px;
      max-width: 400px;
      animation: fadeIn .4s ease;
    }

    .icon {
      margin-bottom: 20px;
      display: block;
      svg {
        width: 64px;
        height: 64px;
      }
    }

    h1 {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 10px;
    }

    p {
      color: rgba(255, 255, 255, .5);
      font-size: 14px;
      line-height: 1.7;
      margin-bottom: 28px;
    }

    .retry-button {
      background: linear-gradient(135deg, #10b981, #34d399);
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: #052e16;
      border: none;
      padding: 13px 32px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      transition: transform .15s;
    }

    .retry-button:hover {
      transform: scale(1.04);
    }

    .retry-button:active {
      transform: scale(.97);
    }

    .url {
      margin-top: 16px;
      color: #fff;
      font-size: 12px;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: none;
      }
    }
  </style>
</head>

<body>
  <div class="card">
    <span class="icon">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
        class="lucide lucide-wifi-off-icon lucide-wifi-off">
        <path d="M12 20h.01" />
        <path d="M8.5 16.429a5 5 0 0 1 7 0" />
        <path d="M5 12.859a10 10 0 0 1 5.17-2.69" />
        <path d="M19 12.859a10 10 0 0 0-2.007-1.523" />
        <path d="M2 8.82a15 15 0 0 1 4.177-2.643" />
        <path d="M22 8.82a15 15 0 0 0-11.288-3.764" />
        <path d="m2 2 20 20" />
      </svg>
    </span>
    <h1>ইন্টারনেট সংযোগ নেই</h1>
    <p>
      MadrasaCloud চালাতে ইন্টারনেট সংযোগ প্রয়োজন।<br />
      নেটওয়ার্ক চেক করে আবার চেষ্টা করুন।
    </p>
    <button onclick="retry()" class="retry-button">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
        class="lucide lucide-refresh-ccw-icon lucide-refresh-ccw">
        <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
        <path d="M3 3v5h5" />
        <path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16" />
        <path d="M16 16h5v5" />
      </svg>
      <span>আবার চেষ্টা করুন</span>
    </button>
    <p class="url">madrasacloud.xyz</p>
  </div>

  <script>
    function retry() {
      window.location.href = "https://www.madrasacloud.xyz";
    }

    // ইন্টারনেট ফিরে আসলে অটো রিলোড
    window.addEventListener("online", () => {
      setTimeout(retry, 1000);
    });
  </script>
</body>

</html>
