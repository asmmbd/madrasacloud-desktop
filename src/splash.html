<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MadrasaCloud</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: transparent;
      width: 420px;
      height: 280px;
      overflow: hidden;
      user-select: none;
      -webkit-app-region: drag;
    }

    .container {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #0a2e1a 0%, #050e08 60%, #0a1a0e 100%);
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      border: 1px solid rgba(16,185,129,.3);
      box-shadow: 0 20px 60px rgba(0,0,0,.8), 0 0 0 1px rgba(16,185,129,.1);
      position: relative;
      overflow: hidden;
    }

    /* BG orb */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      pointer-events: none;
    }
    .orb-1 { width:200px; height:200px; background:rgba(16,185,129,.12); top:-40px; left:-40px; }
    .orb-2 { width:150px; height:150px; background:rgba(52,211,153,.08); bottom:-30px; right:-30px; }

    /* Logo */
    .logo {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, #10b981, #059669);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      box-shadow: 0 8px 24px rgba(16,185,129,.4);
      animation: logoIn .5s cubic-bezier(.34,1.56,.64,1) both;
    }

    /* Text */
    .title {
      color: #fff;
      font-size: 24px;
      font-weight: 800;
      letter-spacing: .5px;
      animation: fadeUp .5s ease .15s both;
    }
    .subtitle {
      color: rgba(255,255,255,.45);
      font-size: 13px;
      animation: fadeUp .5s ease .25s both;
      margin-top: -12px;
    }

    /* Progress bar */
    .progress-wrap {
      width: 200px;
      height: 4px;
      background: rgba(255,255,255,.08);
      border-radius: 4px;
      overflow: hidden;
      animation: fadeUp .5s ease .35s both;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #10b981, #34d399);
      border-radius: 4px;
      animation: loading 2s ease forwards;
    }

    /* Version */
    .version {
      position: absolute;
      bottom: 16px;
      right: 20px;
      color: rgba(255,255,255,.2);
      font-size: 11px;
    }

    @keyframes logoIn  { from { transform: scale(0) rotate(-10deg); opacity:0; } to { transform: scale(1) rotate(0); opacity:1; } }
    @keyframes fadeUp  { from { transform: translateY(12px); opacity:0; } to { transform: none; opacity:1; } }
    @keyframes loading { from { width: 0; } to { width: 100%; } }
  </style>
</head>
<body>
  <div class="container">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="logo">
      <img src="../assets/icon.png" alt="MadrasaCloud" style="width: 72px; height: 72px;">
    </div>

    <div style="text-align:center; display:flex; flex-direction:column; align-items:center; gap:6px;">
      <div class="title">MadrasaCloud</div>
      <div class="subtitle">মাদরাসা ম্যানেজমেন্ট সিস্টেম</div>
    </div>

    <div class="progress-wrap">
      <div class="progress-bar"></div>
    </div>

    <div class="version" id="ver">v1.0.0</div>
  </div>

  <script>
    // Load version from package.json
    fetch('../package.json')
      .then(response => response.json())
      .then(data => {
        document.getElementById('ver').textContent = `v${data.version}`;
      })
      .catch(() => {
        // Fallback to hardcoded version if package.json can't be loaded
      });
  </script>
</body>
</html>
